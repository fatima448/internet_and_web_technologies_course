<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" >
    <meta name="viewport" content="width=device-width, initial-scale=1.0" >
    <title>Pawvera</title>
    <link rel="icon" href="images/logo.jpg" >
    <link rel="stylesheet" href="style.css" >
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="bg">
      <nav class="container">
       <div class="nav">
          <div class="logo">
            <h1>Pawvera</h1>
          </div>

          <ul class="nav-links" id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#categories">Categories</a></li>
            <li><a href="index.html#contact">Contact</a></li>
          </ul>
        </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" placeholder="Search..." />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
      </div>
    </nav>
    <section class="container " id="cart">
      <div class="title">
        <h2>My <span>Cart</span></h2>
      </div>
      
      <div class="card-wrap">
        <div class="cards">
          <div class="card-item">
            <div class="images">
              <img src="images/dog.food.jpg" alt="Dog food">
            </div>
             <button class="item-remove">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="item-info">
              <h3>Premium Dog Food</h3>
              <p>Nutritious dry food</p>
             
            </div>
            <div class="item-num">
              <button>−</button>
              <span>2</span>
              <button>+</button>
            </div>
            <div class="item-price">Price:
              ₺240</div>
            
          </div>

          <div class="card-item">
            <div class="images">
              <img src="images/pet.bed.jpg" alt="Pet bed">
            </div>
             <button class="item-remove">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="item-info">
              <h3>Cozy Pet Bed</h3>
              <p>Soft & comfortable</p>
              
            </div>
            <div class="item-num">
              <button>−</button>
              <span>1</span>
              <button>+</button>
            </div>
            <div class="item-price">Price:
              ₺850</div>
           
          </div>

          <div class="card-item">
            <div class="images">
              <img src="images/toy3.jpg" alt="Pet toy">
            </div>
             <button class="item-remove">
              <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="item-info">
              <h3>Pet Toy</h3>
              <p>Jolly Dog Toy</p>
            </div>
            <div class="item-num">
              <button>−</button>
              <span>1</span>
              <button>+</button>
            </div>
            <div class="item-price">Price: ₺180</div>
           
          </div>
        </div>

        <div class="summary">
          <h3>Order Summary</h3>
          <div class="summary-line">
            <span>Subtotal</span><span>₺1,270</span>
          </div>
          <div class="summary-line">
            <span>Shipping</span><span class="free">FREE</span>
          </div>
          <div class="summary-line total">
            <span>Total</span><span>₺1,270</span>
          </div>

          <button class="btn-checkout">
            Checkout <i class="fa-solid fa-arrow-right"></i>
          </button>
                
      </div>
    </section>
    </div>
    <footer> © Powered by Fatima Alfurais</footer>
  </body>
</html>
