<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pawvera</title>
    <link rel="icon" href="images/logo.jpg" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
</head>
<body>
    <nav class="container">
      <ul class="nav-links" id="navMenu">
        <li><a href="index.html">Home</a></li>
        <li><a href="index.html#categories">Products</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>

      <div class="logo">
        <h1>Pawvera</h1>
      </div>
      <div class="nav-right">
        <div class="search-box">
          <input type="text" placeholder="Search..." />
          <i class="fa-solid fa-magnifying-glass"></i>
        </div>
       <input type="checkbox" id="menu-toggle" />

        <label for="menu-toggle" class="menu-icon">
          <i class="fa-solid fa-bars"></i>
        </label>
        <ul class="links-menu">
          <li><a href="index.html">Home</a></li>
          <li><a href="index.html#categories">Products</a></li>
          <li><a href="index.html#contact">Contact</a></li>
        </ul>

        <a href="cart.html"><i class="fa-solid fa-cart-arrow-down"></i></a>
        <a href="profile.html"><i class="fa-solid fa-user"></i></a>
      </div>
    </nav>

    
      <div class="banner">
        <img src="images/fish_banner.jpg" alt="Fish banner">
      </div>     
      
      <div class="products-section">
        <div class="cards">
          <div class="card-item">
            <div class="images">
                <img src="images/fish.food.jpg" alt="Fish food">
            </div>
            <div class="item-info">
              <h3>Fish Pellets</h3>
              <p>Food for goldfish & betta</p>
              <div class="item-footer">
                Price: 
                <span class="item-price">₺120</span>
                <a href="#"><button class="btn-add"><i class="fa-solid fa-cart-plus"></i> Add</button></a>
              </div>
            </div>
          </div>
 
          <div class="card-item">
            <div class="images">
                <img src="images/aqua.decoration.jpg" alt="Aqua decoration">
            </div>
            <div class="item-info">
              <h3>Aquarium Plant Set</h3>
              <p>Decorative plants & wood</p>
              <div class="item-footer">
                 Price: 
                <span class="item-price">₺250</span>
                <a href="#"><button class="btn-add"><i class="fa-solid fa-cart-plus"></i> Add</button></a>
              </div>
            </div>
          </div>
 
          <div class="card-item">
            <div class="images">
                <img src="images/air.pump.jpg" alt="Air pump">
            </div>
            <div class="item-info">
              <h3>Air Pump Kit</h3>
              <p>Oxygen supply for tank</p>
              <div class="item-footer">
                 Price: 
                <span class="item-price">₺300</span>
                <a href="#"><button class="btn-add"><i class="fa-solid fa-cart-plus"></i> Add</button></a>
              </div>
            </div>
          </div>
        </div>
      </div>
    
    <footer>Powered by Fatima Alfurais</footer>
</body>
</html>
